name: build-ffmpeg-vmaf-cuda-ubuntu

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git ref to build
        required: false
        default: master
      vmaf_ref:
        description: Netflix VMAF git ref to build
        required: false
        default: master
      nv_codec_headers_ref:
        description: nv-codec-headers git ref to build
        required: false
        default: master
      ubuntu_cuda_package:
        description: Ubuntu CUDA Toolkit apt package
        required: false
        default: cuda-toolkit-12-8
      publish_release:
        description: Publish a preview release
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FFMPEG_REF: ${{ inputs.ffmpeg_ref || 'master' }}
  VMAF_REF: ${{ inputs.vmaf_ref || 'master' }}
  NV_CODEC_HEADERS_REF: ${{ inputs.nv_codec_headers_ref || 'master' }}

jobs:
  ubuntu-build:
    name: Ubuntu build
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      CUDA_PACKAGE: ${{ inputs.ubuntu_cuda_package || 'cuda-toolkit-12-8' }}
      FFMPEG_PREFIX: ${{ github.workspace }}/_install/ubuntu
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib/x86_64-linux-gnu:/usr/local/cuda/lib64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            file \
            g++ \
            gcc \
            git \
            make \
            meson \
            nasm \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            wget \
            yasm

      - name: Install CUDA Toolkit
        shell: bash
        run: |
          set -euxo pipefail
          . /etc/os-release
          cuda_repo="ubuntu${VERSION_ID/./}"
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${cuda_repo}/x86_64/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${CUDA_PACKAGE}"
          export PATH="/usr/local/cuda/bin:${PATH}"
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_HOME=/usr/local/cuda" >> "$GITHUB_ENV"
          echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
          nvcc --version

      - name: Build nv-codec-headers
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${NV_CODEC_HEADERS_REF}" https://github.com/FFmpeg/nv-codec-headers.git
          make -C nv-codec-headers -j"$(nproc)"
          sudo make -C nv-codec-headers install

      - name: Build libvmaf with CUDA
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="/usr/local/cuda/bin:${PATH}"
          git clone --depth 1 --branch "${VMAF_REF}" https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf
          meson setup build \
            --buildtype=release \
            --default-library=shared \
            -Denable_cuda=true \
            -Denable_float=true \
            -Dbuilt_in_models=true \
            -Denable_tests=false \
            -Denable_docs=false \
            -Denable_tools=false
          ninja -C build -v
          sudo ninja -C build install
          sudo ldconfig
          pkg-config --modversion libvmaf
          test -f /usr/local/include/libvmaf/libvmaf_cuda.h

      - name: Build FFmpeg with libvmaf_cuda
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="/usr/local/cuda/bin:${PATH}"
          git clone --depth 1 --branch "${FFMPEG_REF}" https://github.com/FFmpeg/FFmpeg.git
          cd FFmpeg
          ./configure \
            --prefix="${FFMPEG_PREFIX}" \
            --enable-gpl \
            --enable-nonfree \
            --enable-ffnvcodec \
            --enable-cuda-nvcc \
            --enable-libvmaf \
            --enable-nvenc \
            --enable-cuvid \
            --disable-debug \
            --extra-cflags="-I/usr/local/include -I/usr/local/cuda/include" \
            --extra-ldflags="-L/usr/local/lib -L/usr/local/lib/x86_64-linux-gnu -L/usr/local/cuda/lib64 -Wl,-rpath,\$ORIGIN/../lib"
          grep -E 'libvmaf|libvmaf_cuda|ffnvcodec|cuda_nvcc' config.log ffbuild/config.mak || true
          make -j"$(nproc)"
          make install

      - name: Generate build metadata
        id: build_meta
        shell: bash
        run: |
          set -euxo pipefail
          ffmpeg_bin="${FFMPEG_PREFIX}/bin/ffmpeg"
          ffmpeg_version_line="$(${ffmpeg_bin} -hide_banner -version | head -n1)"
          ffmpeg_version="$(printf '%s\n' "${ffmpeg_version_line}" | awk '{print $3}')"
          ffmpeg_version_tag="$(printf '%s' "${ffmpeg_version}" | tr -cs 'A-Za-z0-9._-' '-')"
          ffmpeg_version_tag="${ffmpeg_version_tag#-}"
          ffmpeg_version_tag="${ffmpeg_version_tag%-}"
          ffmpeg_commit="$(git -C FFmpeg rev-parse HEAD)"
          vmaf_commit="$(git -C vmaf rev-parse HEAD)"
          nv_codec_headers_commit="$(git -C nv-codec-headers rev-parse HEAD)"
          libvmaf_version="$(pkg-config --modversion libvmaf)"
          nvcc_version="$(nvcc --version | tail -n1)"
          gcc_version="$(gcc --version | head -n1)"
          meson_version="$(meson --version)"
          ninja_version="$(ninja --version)"

          {
            echo "## Ubuntu FFmpeg VMAF_CUDA build"
            echo
            echo "- FFmpeg version: \`${ffmpeg_version}\`"
            echo "- FFmpeg ref: \`${FFMPEG_REF}\`"
            echo "- FFmpeg commit: \`${ffmpeg_commit}\`"
            echo "- VMAF ref: \`${VMAF_REF}\`"
            echo "- VMAF commit: \`${vmaf_commit}\`"
            echo "- nv-codec-headers ref: \`${NV_CODEC_HEADERS_REF}\`"
            echo "- nv-codec-headers commit: \`${nv_codec_headers_commit}\`"
            echo "- CUDA package: \`${CUDA_PACKAGE}\`"
            echo "- libvmaf version: \`${libvmaf_version}\`"
            echo "- NVCC version: \`${nvcc_version}\`"
            echo "- GCC version: \`${gcc_version}\`"
            echo "- Meson version: \`${meson_version}\`"
            echo "- Ninja version: \`${ninja_version}\`"
            echo
            echo "<details>"
            echo "<summary>Detailed build metadata</summary>"
            echo
            echo '```text'
            echo "ffmpeg_version=${ffmpeg_version}"
            echo "ffmpeg_version_line=${ffmpeg_version_line}"
            echo "ffmpeg_ref=${FFMPEG_REF}"
            echo "ffmpeg_commit=${ffmpeg_commit}"
            echo "vmaf_ref=${VMAF_REF}"
            echo "vmaf_commit=${vmaf_commit}"
            echo "nv_codec_headers_ref=${NV_CODEC_HEADERS_REF}"
            echo "nv_codec_headers_commit=${nv_codec_headers_commit}"
            echo "cuda_package=${CUDA_PACKAGE}"
            echo "libvmaf_version=${libvmaf_version}"
            echo "nvcc_version=${nvcc_version}"
            echo "gcc_version=${gcc_version}"
            echo "meson_version=${meson_version}"
            echo "ninja_version=${ninja_version}"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "ffmpeg_version=${ffmpeg_version}"
            echo "ffmpeg_version_tag=${ffmpeg_version_tag}"
            echo "archive_name=ffmpeg-ubuntu-vmaf-cuda-${ffmpeg_version_tag}.tar.gz"
            echo "release_tag=preview-ubuntu-vmaf-cuda-${ffmpeg_version_tag}"
            echo "release_name=Ubuntu FFmpeg VMAF CUDA ${ffmpeg_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Package Ubuntu artifact
        shell: bash
        env:
          ARCHIVE_NAME: ${{ steps.build_meta.outputs.archive_name }}
        run: |
          set -euxo pipefail
          mkdir -p "${FFMPEG_PREFIX}/lib"
          cp -a /usr/local/lib/libvmaf.so* "${FFMPEG_PREFIX}/lib/" 2>/dev/null || true
          cp -a /usr/local/lib/x86_64-linux-gnu/libvmaf.so* "${FFMPEG_PREFIX}/lib/" 2>/dev/null || true
          "${FFMPEG_PREFIX}/bin/ffmpeg" -hide_banner -buildconf | tee "${FFMPEG_PREFIX}/buildconf.txt"
          "${FFMPEG_PREFIX}/bin/ffmpeg" -hide_banner -filters | tee "${FFMPEG_PREFIX}/filters.txt"
          grep -q 'libvmaf_cuda' "${FFMPEG_PREFIX}/filters.txt"
          tar -C "${FFMPEG_PREFIX}" -czf "${ARCHIVE_NAME}" .

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-ubuntu-vmaf-cuda
          path: ${{ steps.build_meta.outputs.archive_name }}
          if-no-files-found: error

      - name: Publish preview release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_meta.outputs.release_tag }}
          name: ${{ steps.build_meta.outputs.release_name }}
          prerelease: true
          body: |
            Preview build for FFmpeg `${{ steps.build_meta.outputs.ffmpeg_version }}`.

            Detailed build metadata is available in the Actions run summary.
          files: |
            ${{ steps.build_meta.outputs.archive_name }}
