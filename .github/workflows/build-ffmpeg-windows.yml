name: build-ffmpeg-windows

on:
  # push:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git ref to build
        required: false
        default: master
      ffmpeg_patch:
        description: Optional inline patch content for FFmpeg (paste git diff / unified diff)
        required: false
        default: ''

permissions:
  contents: read

env:
  FFMPEG_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ffmpeg_ref || 'master' }}
  FFMPEG_PATCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ffmpeg_patch || '' }}

jobs:
  windows-build:
    name: Windows build
    runs-on: windows-2022
    timeout-minutes: 120
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            base-devel
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-yasm

      - name: Verify toolchain
        run: |
          set -euxo pipefail
          command -v gcc
          command -v git
          command -v make
          command -v nasm
          command -v objdump
          command -v pkg-config
          command -v yasm
          gcc --version

      - name: Clone FFmpeg
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${FFMPEG_REF}" https://github.com/FFmpeg/FFmpeg.git

      - name: Apply built-in stats flush patch
        run: |
          set -euxo pipefail
          cd FFmpeg
          perl -0pi -e 's/fprintf\(s->stats_file, "\\n"\);\n    }/fprintf(s->stats_file, "\\n");\n        fflush(s->stats_file);\n    }/' libavfilter/vf_psnr.c
          perl -0pi -e 's/fprintf\(s->stats_file, "All:%f \(%f\)\\n", ssimv, ssim_db\(ssimv, 1\.0\)\);\n    }/fprintf(s->stats_file, "All:%f (%f)\\n", ssimv, ssim_db(ssimv, 1.0));\n        fflush(s->stats_file);\n    }/' libavfilter/vf_ssim.c
          perl -0pi -e 's/fprintf\(s->stats_file, "\\n"\);\n    }\n\n    return ff_filter_frame\(ctx->outputs\[0\], master\);/fprintf(s->stats_file, "\\n");\n        fflush(s->stats_file);\n    }\n\n    return ff_filter_frame(ctx->outputs[0], master);/' libavfilter/vf_xpsnr.c
          git diff --stat

      - name: Apply optional FFmpeg patch
        if: ${{ env.FFMPEG_PATCH != '' }}
        run: |
          set -euxo pipefail
          cd FFmpeg
          printf '%s' "$FFMPEG_PATCH" > custom.patch
          git apply --check custom.patch
          git apply --whitespace=nowarn custom.patch
          git diff --stat

      - name: Build FFmpeg
        run: |
          set -euxo pipefail
          cd FFmpeg
          ffmpeg_prefix="${PWD}/ffmpeg-install"
          export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"
          export CFLAGS="-D_FORTIFY_SOURCE=2 -fstack-protector-strong -O2 -pipe -D__USE_MINGW_ANSI_STDIO=1"
          export LDFLAGS="-static-libgcc"
          ./configure \
            --prefix="${ffmpeg_prefix}" \
            --target-os=mingw32 \
            --arch=x86_64 \
            --pkg-config=pkg-config \
            --pkg-config-flags=--static \
            --disable-autodetect \
            --disable-debug \
            --disable-doc \
            --disable-ffplay \
            --disable-ffprobe \
            --enable-static \
            --disable-shared
          make -j"$(nproc)"
          make install

      - name: Check runtime DLL dependencies
        run: |
          set -euxo pipefail
          ffmpeg_exe="${PWD}/FFmpeg/ffmpeg-install/bin/ffmpeg.exe"
          dep_list="${PWD}/ffmpeg-runtime-dependencies.txt"
          : > "${dep_list}"

          while IFS= read -r dll_name; do
            [[ -n "${dll_name}" ]] || continue

            case "${dll_name,,}" in
              avicap32.dll|bcrypt.dll|gdi32.dll|kernel32.dll|msvcrt.dll|ole32.dll|oleaut32.dll|shell32.dll|shlwapi.dll|user32.dll|ws2_32.dll)
                printf '%s => system\n' "${dll_name}" | tee -a "${dep_list}"
                continue
                ;;
            esac

            dll_source="/mingw64/bin/${dll_name}"

            if [[ -f "${dll_source}" ]]; then
              printf '%s => %s\n' "${dll_name}" "${dll_source}" | tee -a "${dep_list}"
            else
              printf '%s => not found\n' "${dll_name}" | tee -a "${dep_list}"
            fi
          done < <(objdump -p "${ffmpeg_exe}" | awk '/DLL Name:/ {print $3}' | sort -u)

          if grep -Fq '=> not found' "${dep_list}"; then
            echo 'Missing runtime DLL dependency detected.' >&2
            exit 1
          fi

      - name: Collect build artifact
        run: |
          set -euxo pipefail
          ffmpeg_prefix="${PWD}/FFmpeg/ffmpeg-install"
          artifact_dir="${PWD}/artifact"
          mkdir -p "${artifact_dir}"
          cp -f "${ffmpeg_prefix}/bin/ffmpeg.exe" "${artifact_dir}/ffmpeg.exe"
          cp -f "${PWD}/ffmpeg-runtime-dependencies.txt" "${artifact_dir}/runtime-dependencies.txt"

          queue="${artifact_dir}/.dll-queue.txt"
          seen="${artifact_dir}/.dll-seen.txt"
          : > "${queue}"
          : > "${seen}"
          printf '%s\n' "${artifact_dir}/ffmpeg.exe" >> "${queue}"

          while IFS= read -r binary_path || [[ -n "${binary_path}" ]]; do
            [[ -n "${binary_path}" ]] || continue

            if grep -Fxq "${binary_path}" "${seen}"; then
              continue
            fi

            printf '%s\n' "${binary_path}" >> "${seen}"

            while IFS= read -r dll_name; do
              [[ -n "${dll_name}" ]] || continue

              dll_source="/mingw64/bin/${dll_name}"
              dll_target="${artifact_dir}/${dll_name}"

              if [[ ! -f "${dll_source}" ]]; then
                continue
              fi

              if [[ ! -f "${dll_target}" ]]; then
                cp -f "${dll_source}" "${dll_target}"
                printf '%s\n' "${dll_target}" >> "${queue}"
              fi
            done < <(objdump -p "${binary_path}" | awk '/DLL Name:/ {print $3}')
          done < "${queue}"

          rm -f "${queue}" "${seen}"

          "${artifact_dir}/ffmpeg.exe" -hide_banner -buildconf | tee "${artifact_dir}/buildconf.txt"
          "${artifact_dir}/ffmpeg.exe" -hide_banner -filters | tee "${artifact_dir}/filters.txt"
          grep -E '\b(psnr|ssim|xpsnr)\b' "${artifact_dir}/filters.txt"
          ls -1 "${artifact_dir}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows
          path: artifact
          if-no-files-found: error
