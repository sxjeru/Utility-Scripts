name: build-ffmpeg-vmaf-cuda-windows

on:
  # push:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git ref to build
        required: false
        default: master
      vmaf_ref:
        description: Netflix VMAF git ref to build
        required: false
        default: master
      nv_codec_headers_ref:
        description: nv-codec-headers git ref to build
        required: false
        default: master
      windows_cuda_version:
        description: Windows CUDA Toolkit version for Jimver/cuda-toolkit
        required: false
        default: 13.2.0
      publish_release:
        description: Publish a preview release
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FFMPEG_REF: ${{ inputs.ffmpeg_ref || 'master' }}
  VMAF_REF: ${{ inputs.vmaf_ref || 'master' }}
  NV_CODEC_HEADERS_REF: ${{ inputs.nv_codec_headers_ref || 'master' }}

jobs:
  windows-build:
    name: Windows build
    runs-on: windows-2022
    timeout-minutes: 240
    env:
      CUDA_VERSION: ${{ inputs.windows_cuda_version || '13.2.0' }}
      VMAF_PREFIX: C:\vmaf-install
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            base-devel
            git
            make
            mingw-w64-x86_64-fdk-aac
            mingw-w64-x86_64-fontconfig
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-libass
            mingw-w64-x86_64-dav1d
            mingw-w64-x86_64-lame
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-libsoxr
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-python
            mingw-w64-x86_64-shaderc
            mingw-w64-x86_64-yasm
            mingw-w64-x86_64-zimg
            mingw-w64-x86_64-libplacebo
            mingw-w64-x86_64-vulkan-headers
            mingw-w64-x86_64-vulkan-loader

      - name: Verify toolchain
        run: |
          set -euxo pipefail
          command -v cl || true
          command -v link || true
          command -v nvcc
          command -v gcc
          command -v meson
          command -v ninja
          command -v pkg-config
          where.exe cl
          where.exe link
          test -f /mingw64/include/vulkan/vulkan.h
          pkg-config --exists shaderc
          nvcc --version
          gcc --version

      - name: Build nv-codec-headers
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${NV_CODEC_HEADERS_REF}" https://github.com/FFmpeg/nv-codec-headers.git
          make -C nv-codec-headers -j"$(nproc)"
          make -C nv-codec-headers PREFIX=/mingw64 install
          test -f /mingw64/include/ffnvcodec/dynlink_cuda.h
          test -f /mingw64/lib/pkgconfig/ffnvcodec.pc

      - name: Clone FFmpeg
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${FFMPEG_REF}" https://github.com/FFmpeg/FFmpeg.git

      - name: Apply built-in stats flush patch
        run: |
          set -euxo pipefail
          cd FFmpeg
          perl -0pi -e 's/fprintf\(s->stats_file, "\\n"\);\n    }/fprintf(s->stats_file, "\\n");\n        fflush(s->stats_file);\n    }/' libavfilter/vf_psnr.c
          perl -0pi -e 's/fprintf\(s->stats_file, "All:%f \(%f\)\\n", ssimv, ssim_db\(ssimv, 1\.0\)\);\n    }/fprintf(s->stats_file, "All:%f (%f)\\n", ssimv, ssim_db(ssimv, 1.0));\n        fflush(s->stats_file);\n    }/' libavfilter/vf_ssim.c
          perl -0pi -e 's/fprintf\(s->stats_file, "\\n"\);\n    }\n\n    return ff_filter_frame\(ctx->outputs\[0\], master\);/fprintf(s->stats_file, "\\n");\n        fflush(s->stats_file);\n    }\n\n    return ff_filter_frame(ctx->outputs[0], master);/' libavfilter/vf_xpsnr.c
          git diff --stat

      - name: Patch and build libvmaf with CUDA
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${VMAF_REF}" https://github.com/Netflix/vmaf.git
          cd vmaf

          test -n "${VCToolsInstallDir:-}"
          msvc_bin_dir="$(cygpath -u "${VCToolsInstallDir}")/bin/Hostx64/x64"
          export PATH="${msvc_bin_dir}:${PATH}"
          cuda_path_unix="$(cygpath -u "${CUDA_PATH}")"

          for cuda_dir in libvmaf/src/cuda libvmaf/src/feature/cuda; do
            [ -d "${cuda_dir}" ] || continue
            find "${cuda_dir}" -type f \( -name '*.c' -o -name '*.h' -o -name '*.cu' -o -name '*.cuh' \) \
              -exec sed -i \
                -e 's/#include <pthread.h>/#include "pthread.h"/g' \
                -e 's/#include <unistd.h>/#include "pthread_unistd.h"/g' {} +

            for header in pthread.h pthread_compat.h pthread_signal.h pthread_time.h pthread_unistd.h sched.h; do
              cp "/mingw64/include/${header}" "${cuda_dir}/"
            done
          done

          cp -a /mingw64/include/ffnvcodec libvmaf/src/
          mkdir -p compat-include
          cp -a /mingw64/include/ffnvcodec compat-include/
          for header in pthread.h pthread_compat.h pthread_signal.h pthread_time.h pthread_unistd.h sched.h; do
            cp "/mingw64/include/${header}" compat-include/
          done
          mkdir -p libvmaf/compat-lib
          if [ -f /mingw64/lib/libwinpthread.dll.a ]; then
            cp /mingw64/lib/libwinpthread.dll.a libvmaf/compat-lib/winpthread.lib
          elif [ -f /mingw64/lib/libwinpthread.a ]; then
            cp /mingw64/lib/libwinpthread.a libvmaf/compat-lib/winpthread.lib
          else
            echo 'winpthread import library not found' >&2
            exit 1
          fi

          echo "==== libvmaf public export macros before patch ===="
          grep -nE 'VMAF_PUBLIC|VMAF_DLL|VMAF_BUILDING_DLL|dllexport|dllimport' libvmaf/include/libvmaf/*.h || true

          python - <<'PY'
          from pathlib import Path
          import re

          marker = 'V0_PATCHED_VMAF_PUBLIC'
          patch_def = (
              "/* V0_PATCHED_VMAF_PUBLIC */\n"
              "#if defined(_WIN32) || defined(__CYGWIN__)\n"
              "#  if defined(VMAF_DLL)\n"
              "#    if defined(VMAF_BUILDING_DLL)\n"
              "#      define VMAF_PUBLIC __declspec(dllexport)\n"
              "#    else\n"
              "#      define VMAF_PUBLIC __declspec(dllimport)\n"
              "#    endif\n"
              "#  else\n"
              "#    define VMAF_PUBLIC\n"
              "#  endif\n"
              "#elif defined(__GNUC__) && __GNUC__ >= 4\n"
              "#  define VMAF_PUBLIC __attribute__((visibility(\"default\")))\n"
              "#else\n"
              "#  define VMAF_PUBLIC\n"
              "#endif\n"
          )
          prototype_pattern = re.compile(
              r'(^[ \t]*)(?!(?:VMAF_PUBLIC\b))(int|void|const[ \t]+char[ \t]*\*)[ \t\r\n]+(vmaf_[A-Za-z0-9_]+[ \t]*\()',
              flags=re.MULTILINE,
          )

          header_dir = Path('libvmaf/include/libvmaf')
          headers = sorted(header_dir.glob('*.h'))
          if not headers:
              raise SystemExit('libvmaf public headers not found')

          macro_patched = []
          export_patched = {}
          for path in headers:
              text = path.read_text()
              new_text = text

              if marker not in new_text:
                  if 'VMAF_PUBLIC' in new_text:
                      new_text, _ = re.subn(
                          r'(^|\n)[ \t]*#[ \t]*define[ \t]+VMAF_PUBLIC\b[^\n]*',
                          lambda m: m.group(1) + patch_def.rstrip('\n'),
                          new_text,
                          flags=re.MULTILINE,
                      )
                  if marker not in new_text:
                      new_text = patch_def + new_text
                  macro_patched.append(path.name)

              new_text, export_count = prototype_pattern.subn(
                  r'\1VMAF_PUBLIC \2 \3',
                  new_text,
              )
              if export_count:
                  export_patched[path.name] = export_count

              if new_text != text:
                  path.write_text(new_text)

          print('macro patched headers:', ', '.join(macro_patched) if macro_patched else 'none')
          print('export patched headers:', export_patched if export_patched else 'none')
          PY

          echo "==== libvmaf public export macros after patch ===="
          grep -nE 'VMAF_PUBLIC|VMAF_DLL|VMAF_BUILDING_DLL|dllexport|dllimport|V0_PATCHED_VMAF_PUBLIC' libvmaf/include/libvmaf/*.h || true

          python - <<'PY'
          from pathlib import Path
          path = Path('libvmaf/src/feature/integer_adm.h')
          text = path.read_text()
          old = '''static const struct dwt_model_params dwt_7_9_YCbCr_threshold[3] = {
              {.a = 0.495, .k = 0.466, .f0 = 0.401, .g = {1.501, 1.0, 0.534, 1.0}},
              {.a = 1.633, .k = 0.353, .f0 = 0.209, .g = {1.520, 1.0, 0.502, 1.0}},
              {.a = 0.944, .k = 0.521, .f0 = 0.404, .g = {1.868, 1.0, 0.516, 1.0}}};'''
          new = '''static const struct dwt_model_params dwt_7_9_YCbCr_threshold[3] = {
              {0.495, 0.466, 0.401, {1.501, 1.0, 0.534, 1.0}},
              {1.633, 0.353, 0.209, {1.520, 1.0, 0.502, 1.0}},
              {0.944, 0.521, 0.404, {1.868, 1.0, 0.516, 1.0}}};'''
          if old in text:
              path.write_text(text.replace(old, new))
          PY

          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new):
              if old not in text:
                  raise SystemExit(f'patch target not found: {old!r}')
              return text.replace(old, new, 1)

          path = Path('libvmaf/src/meson.build')
          text = path.read_text()
          text = replace_once(
              text,
              "cuda_compiler.version().version_compare('<13')",
              "cuda_compiler.version().version_compare('<13') and cuda_compiler.version().version_compare('<12.8')",
          )
          text = replace_once(
              text,
              "cuda_compiler.version().version_compare('>12.8')",
              "cuda_compiler.version().version_compare('>=13')",
          )
          text = replace_once(
              text,
              "        c_args : vmaf_cflags_common,\n        cuda_args: cuda_flags",
              "        dependencies : [stdatomic_dependency],\n        c_args : vmaf_cflags_common,\n        cuda_args: cuda_flags",
          )
          text = replace_once(
              text,
              "thread_lib = dependency('threads')\nmath_lib = cc.find_library('m', required : false)",
              "thread_lib = dependency('threads')\nwinpthread_dependencies = []\nif host_machine.system() == 'windows' and cc.get_id() == 'msvc'\n    winpthread_path = meson.current_source_dir() / '../compat-lib'\n    winpthread_dependencies += cc.find_library('winpthread', dirs : [winpthread_path], required : true)\nendif\nmath_lib = cc.find_library('m', required : false)",
          )
          text = replace_once(
              text,
              "    dependencies : [\n      thread_lib,\n      math_lib,\n      stdatomic_dependency,\n      cuda_dependency,\n    ],",
              "    dependencies : [\n      thread_lib,\n      math_lib,\n      stdatomic_dependency,\n      cuda_dependency,\n    ] + winpthread_dependencies,",
          )
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path
          path = Path('libvmaf/src/compat/msvc/stdatomic.h')
          text = path.read_text()
          text = text.replace('#include "common/attributes.h"\n', '')
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new):
              if old not in text:
                  raise SystemExit(f'patch target not found: {old!r}')
              return text.replace(old, new, 1)

          header_path = Path('libvmaf/src/feature/mkdirp.h')
          header_text = header_path.read_text()
          header_text = replace_once(
              header_text,
              '#include <sys/stat.h>',
              '#include <sys/stat.h>\n#ifdef _WIN32\n#include "pthread_compat.h"\n#endif',
          )
          header_path.write_text(header_text)

          path = Path('libvmaf/src/feature/mkdirp.c')
          text = path.read_text()
          text = replace_once(
              text,
              '#include <unistd.h>',
              '#ifdef _WIN32\n#include <direct.h>\n#else\n#include <unistd.h>\n#endif',
          )
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new):
              if old not in text:
                  raise SystemExit(f'patch target not found: {old!r}')
              return text.replace(old, new, 1)

          path = Path('libvmaf/src/feature/integer_vif.c')
          text = path.read_text()
          text = replace_once(
              text,
              "    void *data = aligned_malloc(data_sz, MAX_ALIGN);\n    if (!data) return -ENOMEM;\n    memset(data, 0, data_sz);",
              "    uint8_t *data = aligned_malloc(data_sz, MAX_ALIGN);\n    uint8_t *data_base = data;\n    if (!data) return -ENOMEM;\n    memset(data, 0, data_sz);",
          )
          text = replace_once(
              text,
              "    if (data) aligned_free(data);",
              "    if (data_base) aligned_free(data_base);",
          )
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new):
              if old not in text:
                  raise SystemExit(f'patch target not found: {old!r}')
              return text.replace(old, new, 1)

          path = Path('libvmaf/src/log.c')
          text = path.read_text()
          text = replace_once(
              text,
              '#include <stdarg.h>\n#include <unistd.h>',
              '#include <stdarg.h>\n#ifdef _WIN32\n#include <io.h>\n#define isatty _isatty\n#define fileno _fileno\n#else\n#include <unistd.h>\n#endif',
          )
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new):
              if old not in text:
                  raise SystemExit(f'patch target not found: {old!r}')
              return text.replace(old, new, 1)

          path = Path('libvmaf/src/feature/integer_adm.c')
          text = path.read_text()
          text = replace_once(
              text,
              '#include "integer_adm.h"\n#include "log.h"\n',
              '#include "integer_adm.h"\n#include "log.h"\n\n#ifdef _MSC_VER\n#include <intrin.h>\nstatic inline int __builtin_clz(unsigned x) {\n    unsigned long index;\n    if (!x) return 32;\n    _BitScanReverse(&index, x);\n    return 31 - (int)index;\n}\n#endif\n',
          )
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new):
              if old not in text:
                  raise SystemExit(f'patch target not found: {old!r}')
              return text.replace(old, new, 1)

          def replace_regex_once(text, pattern, replacement, error):
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'patch target not found: {error}')
              return text

          path = Path('libvmaf/src/read_json_model.c')
          text = path.read_text()
          text = replace_once(
              text,
              '    const size_t cfg_name_sz = strlen(name) + 5 + 1;\n    char cfg_name[cfg_name_sz];\n\n    const size_t generated_key_sz = 4 + 1;\n    char generated_key[generated_key_sz];',
              '    const size_t cfg_name_sz = strlen(name) + 5 + 1;\n    char *cfg_name = malloc(cfg_name_sz);\n    if (!cfg_name) {\n        free((char*)name);\n        return -ENOMEM;\n    }\n\n    char generated_key[5];',
          )
          text = replace_once(
              text,
              '        snprintf(generated_key, generated_key_sz, "%d", i);',
              '        snprintf(generated_key, sizeof(generated_key), "%d", i);',
          )
          text = replace_regex_once(
              text,
              r'\n\s*sprintf\(\(char\*\)c\.name,\s*"%s_%04d",\s*name,\s*\+\+i\);',
              '\n            snprintf((char*)c.name, cfg_name_sz, "%s_%04d",\n                     name, ++i);',
              'c.name sprintf',
          )
          text = replace_once(
              text,
              '    free((char*)name);\n    if (!(*model_collection)) return -EINVAL;\n    return err;',
              '    free(cfg_name);\n    free((char*)name);\n    if (!(*model_collection)) return -EINVAL;\n    return err;',
          )
          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('libvmaf/src/libvmaf.c')
          text = path.read_text()

          text, count = re.subn(
              r"char name\[name_sz\];\n\s*memset\(name, 0,\s*name_sz\);",
              "char *name = malloc(name_sz);\n    if (!name) return -ENOMEM;\n    memset(name, 0, name_sz);",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('patch target not found: libvmaf name buffer')

          text, count = re.subn(
              r"(\s*err \|= vmaf_feature_score_pooled\(vmaf, name, pool_method,\n\s*&score->bootstrap\.ci\.p95\.hi,\n\s*index_low, index_high\);\n\n\s*return err;)",
              "    err |= vmaf_feature_score_pooled(vmaf, name, pool_method,\n                                    &score->bootstrap.ci.p95.hi,\n                                    index_low, index_high);\n\n    free(name);\n    return err;",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('patch target not found: libvmaf free(name)')

          path.write_text(text)
          PY

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('libvmaf/src/predict.c')
          text = path.read_text()

          func_pattern = re.compile(
              r"static int vmaf_bootstrap_predict_score_at_index\(.*?\n\}",
              re.S,
          )
          match = func_pattern.search(text)
          if not match:
              raise SystemExit('patch target not found: bootstrap function')

          func = match.group(0)

          func, count = re.subn(
              r"double scores\[model_collection->cnt\];",
              "double *scores = malloc(sizeof(*scores) * model_collection->cnt);\n    if (!scores) return -ENOMEM;",
              func,
              count=1,
          )
          if count != 1:
              raise SystemExit('patch target not found: predict scores buffer')

          func, count = re.subn(
              r"if \(err\) return err;",
              "if (err) goto free_scores;",
              func,
              count=2,
          )
          if count != 2:
              raise SystemExit('patch target not found: predict early returns')

          func, count = re.subn(
              r"char name\[name_sz\];\n\s*memset\(name, 0, name_sz\);",
              "char *name = malloc(name_sz);\n    if (!name) {\n        err = -ENOMEM;\n        goto free_scores;\n    }\n    memset(name, 0, name_sz);",
              func,
              count=1,
          )
          if count != 1:
              raise SystemExit('patch target not found: predict name buffer')

          func, count = re.subn(
              r"\s*err \|= vmaf_feature_collector_append\(feature_collector, name,\n\s*score->bootstrap\.ci\.p95\.hi,\n\s*index\);\n\s*return err;",
              "    err |= vmaf_feature_collector_append(feature_collector, name,\n                                         score->bootstrap.ci.p95.hi,\n                                         index);\n    free(name);\nfree_scores:\n    free(scores);\n    return err;",
              func,
              count=1,
          )
          if count != 1:
              raise SystemExit('patch target not found: predict cleanup')

          path.write_text(text[:match.start()] + func + text[match.end():])
          PY

          vmaf_prefix="$(cygpath -u "${VMAF_PREFIX}")"
          mkdir -p "${vmaf_prefix}"
          cd libvmaf
          compat_include_win="$(cygpath -w ../compat-include)"
          export INCLUDE="${compat_include_win};${INCLUDE:-}"
          unset CL
          cuda_host_compiler="$(cygpath -m "${msvc_bin_dir}/cl.exe")"
          cuda_nvcc="$(cygpath -m "${cuda_path_unix}/bin/nvcc.exe")"
          export CUDAHOSTCXX="${cuda_host_compiler}"
          export NVCC_CCBIN="${cuda_host_compiler}"
          export NVCC_PREPEND_FLAGS="-allow-unsupported-compiler -diag-suppress=108 --Wno-deprecated-gpu-targets"
          export PATH="${cuda_path_unix}/bin:${PATH}"
          export CFLAGS="-GS- -D_USE_MATH_DEFINES -DVMAF_DLL -DVMAF_BUILDING_DLL"
          export CXXFLAGS="-GS- -DVMAF_DLL -DVMAF_BUILDING_DLL"
          export NVCC_PREPEND_FLAGS="${NVCC_PREPEND_FLAGS} -Xcompiler=-GS- -DVMAF_DLL -DVMAF_BUILDING_DLL"
          cat > meson-cuda.ini <<EOF
          [binaries]
          c = 'cl'
          cpp = 'cl'
          cuda = '${cuda_nvcc}'
          EOF
          command -v link
          where.exe link
          meson setup build \
            --wipe \
            --vsenv \
            --native-file meson-cuda.ini \
            --buildtype=release \
            --default-library=shared \
            -Db_staticpic=false \
            -Denable_asm=false \
            -Denable_cuda=true \
            -Denable_float=true \
            -Dbuilt_in_models=true \
            -Denable_tests=false \
            -Denable_docs=false \
            -Denable_tools=false \
            --prefix="${vmaf_prefix}"
          ninja -C build -v
          found_lib=""
          for candidate in \
            build/src/vmaf.lib \
            build/src/libvmaf.lib \
            build/src/libvmaf.dll.a \
            build/src/vmaf.dll.a \
            build/src/libvmaf.a \
            build/src/vmaf.a \
            src/vmaf.lib \
            src/libvmaf.lib \
            src/libvmaf.dll.a \
            src/vmaf.dll.a \
            src/libvmaf.a \
            src/vmaf.a; do
            if [ -f "${candidate}" ]; then
              found_lib="${candidate}"
              break
            fi
          done
          if [ -z "${found_lib}" ]; then
            found_lib="$(find build src -maxdepth 4 -type f \( \
              -name 'vmaf*.lib' -o -name 'libvmaf*.lib' -o -name 'vmaf*.dll.a' -o -name 'libvmaf*.dll.a' -o -name 'vmaf*.a' -o -name 'libvmaf*.a' \
            \) 2>/dev/null | head -n1)"
          fi
          if [ -n "${found_lib}" ]; then
            echo "Found vmaf import/static library: ${found_lib}"
            if [ "${found_lib}" != "build/src/vmaf.lib" ]; then
              cp "${found_lib}" build/src/vmaf.lib
            fi
            if [ "${found_lib}" != "src/vmaf.lib" ]; then
              cp "${found_lib}" src/vmaf.lib
            fi
          else
            echo 'vmaf import/static library not found after meson build; check the libvmaf Windows build configuration' >&2
            find build src -maxdepth 4 -type f \( \
              -name 'vmaf*' -o -name 'libvmaf*' \
            \) 2>/dev/null | sed 's/^/  /' >&2 || true
            echo '--- checking .obj files for exports ---' >&2
            if [ -d build/src/vmaf.dll.p ]; then
              ls build/src/vmaf.dll.p/*.obj 2>/dev/null | head -n3 | while read -r o; do
                echo "## $o" >&2
                dumpbin //SYMBOLS "$o" 2>/dev/null | head -n50 || true
              done >&2
            fi
            exit 1
          fi
          test -f build/src/vmaf.lib
          ninja -C build install
          mkdir -p "${vmaf_prefix}/lib"
          cp build/src/vmaf.lib "${vmaf_prefix}/lib/"

          if [ -f "${vmaf_prefix}/lib/vmaf.lib" ] && [ ! -f "${vmaf_prefix}/lib/libvmaf.a" ]; then
          cp "${vmaf_prefix}/lib/vmaf.lib" "${vmaf_prefix}/lib/libvmaf.a"
          fi

          if [ -f build/src/vmaf.lib ] && [ ! -f "${vmaf_prefix}/lib/libvmaf.a" ]; then
          cp build/src/vmaf.lib "${vmaf_prefix}/lib/libvmaf.a"
          fi
          
          test -f "${vmaf_prefix}/include/libvmaf/libvmaf_cuda.h"
          test -f "${vmaf_prefix}/lib/pkgconfig/libvmaf.pc"

      - name: Build FFmpeg with libvmaf_cuda
        run: |
          set -euxo pipefail
          cd FFmpeg

          cuda_path_unix="$(cygpath -u "${CUDA_PATH}")"
          cuda_path_safe="$(cygpath -m -s "${CUDA_PATH}")"
          vmaf_prefix="$(cygpath -u "${VMAF_PREFIX}")"
          ffmpeg_prefix="${PWD}/ffmpeg-install"

          export PKG_CONFIG_PATH="${vmaf_prefix}/lib/pkgconfig:/mingw64/lib/pkgconfig"
          export PATH="${vmaf_prefix}/bin:${cuda_path_unix}/bin:${PATH}"

          pc="${vmaf_prefix}/lib/pkgconfig/libvmaf.pc"

          echo "==== original libvmaf.pc ===="
          cat "${pc}"

          sed -i "s|^prefix=.*|prefix=${vmaf_prefix}|" "${pc}"
          sed -i -E 's|[[:space:]][A-Za-z]:/[^[:space:]]*compat-lib/winpthread\.lib| -lwinpthread|g' "${pc}"

          echo "==== patched libvmaf.pc ===="
          cat "${pc}"

          echo "==== vmaf files ===="
          find "${vmaf_prefix}" -maxdepth 4 -type f \( \
            -name '*vmaf*.dll' -o \
            -name '*vmaf*.lib' -o \
            -name '*vmaf*.a' -o \
            -name 'libvmaf.pc' \
          \) -print

          echo "==== pkg-config libvmaf ===="
          pkg-config --modversion libvmaf
          pkg-config --cflags libvmaf
          pkg-config --libs libvmaf
          pkg-config --exists "libvmaf >= 2.0.0"

          unset LDFLAGS
          export CFLAGS="-D_FORTIFY_SOURCE=2 -fstack-protector-strong -O2 -pipe -D__USE_MINGW_ANSI_STDIO=1"
          export CXXFLAGS="${CFLAGS}"

          echo "==== exact ffmpeg-style libvmaf probe ===="
          cat > /tmp/test-vmaf-ffmpeg.c <<'EOF'
          #include <libvmaf.h>
          long check_vmaf_init(void) { return (long) vmaf_init; }
          int main(void) { return 0; }
          EOF

          gcc /tmp/test-vmaf-ffmpeg.c \
            $(pkg-config --cflags libvmaf) \
            $(pkg-config --libs libvmaf) \
            -L"${cuda_path_safe}/lib/x64" \
            -o /tmp/test-vmaf-ffmpeg.exe \
            -Wl,--allow-multiple-definition

          ./configure \
            --prefix="${ffmpeg_prefix}" \
            --disable-autodetect \
            --enable-gpl \
            --enable-lto \
            --enable-nonfree \
            --enable-cuvid \
            --enable-ffnvcodec \
            --enable-libass \
            --enable-libfdk-aac \
            --enable-libfontconfig \
            --enable-libfreetype \
            --enable-libshaderc \
            --enable-libharfbuzz \
            --enable-libvmaf \
            --enable-libzimg \
            --enable-libopus \
            --enable-libmp3lame \
            --enable-libdav1d \
            --enable-libsoxr \
            --enable-nvenc \
            --enable-nvdec \
            --enable-cuda-nvcc \
            --enable-shared \
            --disable-static \
            --enable-libplacebo \
            --enable-vulkan \
            --disable-ffplay \
            --disable-doc \
            --disable-debug \
            --extra-cflags="-I${vmaf_prefix}/include -I${vmaf_prefix}/include/libvmaf -I${cuda_path_safe}/include" \
            --extra-ldflags="-L${vmaf_prefix}/lib -L${cuda_path_safe}/lib/x64 -Wl,--allow-multiple-definition" \
            --extra-libs="-lwinpthread" || {
              grep -A120 -B40 -i "vmaf" ffbuild/config.log || true
              grep -A120 -B40 -i "vmaf_init" ffbuild/config.log || true
              exit 1
            }

          grep -E 'libvmaf|libvmaf_cuda|ffnvcodec|cuda_nvcc' config.log ffbuild/config.mak || true
          make -j"$(nproc)"
          make install

          shopt -s nullglob
          vmaf_dlls=("${vmaf_prefix}/bin"/*vmaf*.dll)
          if [ ${#vmaf_dlls[@]} -gt 0 ]; then
            cp "${vmaf_dlls[@]}" "${ffmpeg_prefix}/bin/"
          else
            echo "No VMAF DLLs found under ${vmaf_prefix}/bin after libvmaf install" >&2
            find "${vmaf_prefix}" -maxdepth 4 -type f \( \
              -name '*vmaf*.dll' -o -name '*vmaf*.lib' -o -name '*vmaf*.a' \
            \) -print >&2 || true
            echo 'Expected at least one runtime DLL for shared libvmaf build.' >&2
            exit 1
          fi

      - name: Generate build metadata
        id: build_meta
        run: |
          set -euxo pipefail
          ffmpeg_bin="${PWD}/FFmpeg/ffmpeg-install/bin/ffmpeg.exe"
          ffmpeg_version_line="$(${ffmpeg_bin} -hide_banner -version | head -n1)"
          ffmpeg_version="$(printf '%s\n' "${ffmpeg_version_line}" | awk '{print $3}')"
          ffmpeg_version_tag="$(printf '%s' "${ffmpeg_version}" | tr -cs 'A-Za-z0-9._-' '-')"
          ffmpeg_version_tag="${ffmpeg_version_tag#-}"
          ffmpeg_version_tag="${ffmpeg_version_tag%-}"
          ffmpeg_commit="$(git -C FFmpeg rev-parse HEAD)"
          vmaf_commit="$(git -C vmaf rev-parse HEAD)"
          nv_codec_headers_commit="$(git -C nv-codec-headers rev-parse HEAD)"
          libvmaf_version="$(PKG_CONFIG_PATH="$(cygpath -u "${VMAF_PREFIX}")/lib/pkgconfig:/mingw64/lib/pkgconfig" pkg-config --modversion libvmaf)"
          nvcc_version="$(nvcc --version | tail -n1)"
          gcc_version="$(gcc --version | head -n1)"
          meson_version="$(meson --version)"
          ninja_version="$(ninja --version)"

          {
            echo "## Windows FFmpeg VMAF_CUDA build"
            echo
            echo "- FFmpeg version: \`${ffmpeg_version}\`"
            echo "- FFmpeg ref: \`${FFMPEG_REF}\`"
            echo "- FFmpeg commit: \`${ffmpeg_commit}\`"
            echo "- VMAF ref: \`${VMAF_REF}\`"
            echo "- VMAF commit: \`${vmaf_commit}\`"
            echo "- nv-codec-headers ref: \`${NV_CODEC_HEADERS_REF}\`"
            echo "- nv-codec-headers commit: \`${nv_codec_headers_commit}\`"
            echo "- CUDA version: \`${CUDA_VERSION}\`"
            echo "- libvmaf version: \`${libvmaf_version}\`"
            echo "- NVCC version: \`${nvcc_version}\`"
            echo "- GCC version: \`${gcc_version}\`"
            echo "- Meson version: \`${meson_version}\`"
            echo "- Ninja version: \`${ninja_version}\`"
            echo
            echo "<details>"
            echo "<summary>Detailed build metadata</summary>"
            echo
            echo '```text'
            echo "ffmpeg_version=${ffmpeg_version}"
            echo "ffmpeg_version_line=${ffmpeg_version_line}"
            echo "ffmpeg_ref=${FFMPEG_REF}"
            echo "ffmpeg_commit=${ffmpeg_commit}"
            echo "vmaf_ref=${VMAF_REF}"
            echo "vmaf_commit=${vmaf_commit}"
            echo "nv_codec_headers_ref=${NV_CODEC_HEADERS_REF}"
            echo "nv_codec_headers_commit=${nv_codec_headers_commit}"
            echo "cuda_version=${CUDA_VERSION}"
            echo "libvmaf_version=${libvmaf_version}"
            echo "nvcc_version=${nvcc_version}"
            echo "gcc_version=${gcc_version}"
            echo "meson_version=${meson_version}"
            echo "ninja_version=${ninja_version}"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "ffmpeg_version=${ffmpeg_version}"
            echo "ffmpeg_version_tag=${ffmpeg_version_tag}"
            echo "archive_name=ffmpeg-windows-vmaf-cuda-${ffmpeg_version_tag}.tar.gz"
            echo "release_tag=preview-windows-vmaf-cuda-${ffmpeg_version_tag}"
            echo "release_name=Windows FFmpeg VMAF CUDA ${ffmpeg_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Package Windows artifact
        env:
          ARCHIVE_NAME: ${{ steps.build_meta.outputs.archive_name }}
        run: |
          set -euxo pipefail
          ffmpeg_prefix="${PWD}/FFmpeg/ffmpeg-install"
          cuda_path_unix="$(cygpath -u "${CUDA_PATH}")"
          vmaf_prefix="$(cygpath -u "${VMAF_PREFIX}")"
          workspace_unix="$(cygpath -u "${GITHUB_WORKSPACE}")"

          copy_mingw_runtime_deps() {
            local dep
            local -a deps=()
            local -a targets=("$@")

            for target in "${targets[@]}"; do
              [ -f "${target}" ] || continue
              while IFS= read -r dep; do
                case "${dep}" in
                  /mingw64/bin/*.dll) deps+=("${dep}") ;;
                esac
              done < <(ldd "${target}" 2>/dev/null | awk '/=> \// { print $3 } /^\/mingw64\/bin\/.*\.dll/ { print $1 }')
            done

            if [ ${#deps[@]} -gt 0 ]; then
              printf '%s\n' "${deps[@]}" | sort -u | while IFS= read -r dep; do
                cp -a "${dep}" "${ffmpeg_prefix}/bin/"
              done
            fi
          }

          mkdir -p "${ffmpeg_prefix}/bin"
          cp -a "${vmaf_prefix}"/bin/*.dll "${ffmpeg_prefix}/bin/" 2>/dev/null || true
          cp -a /mingw64/bin/libgcc_s_seh-1.dll "${ffmpeg_prefix}/bin/" 2>/dev/null || true
          cp -a /mingw64/bin/libstdc++-6.dll "${ffmpeg_prefix}/bin/" 2>/dev/null || true
          cp -a /mingw64/bin/libwinpthread-1.dll "${ffmpeg_prefix}/bin/" 2>/dev/null || true
          cp -a "${cuda_path_unix}"/bin/cudart64_*.dll "${ffmpeg_prefix}/bin/" 2>/dev/null || true
          mapfile -t runtime_targets < <(find "${ffmpeg_prefix}/bin" -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dll' \))
          copy_mingw_runtime_deps "${runtime_targets[@]}"
          "${ffmpeg_prefix}/bin/ffmpeg.exe" -hide_banner -buildconf | tee "${ffmpeg_prefix}/buildconf.txt"
          "${ffmpeg_prefix}/bin/ffmpeg.exe" -hide_banner -filters | tee "${ffmpeg_prefix}/filters.txt"
          grep -q 'libvmaf_cuda' "${ffmpeg_prefix}/filters.txt"
          if grep -q -- '--enable-libplacebo' "${ffmpeg_prefix}/buildconf.txt"; then
            grep -q 'libplacebo' "${ffmpeg_prefix}/filters.txt" || {
              echo "libplacebo was enabled in buildconf but the libplacebo filter is missing" >&2
              exit 1
            }
          fi
          tar -C "${ffmpeg_prefix}" -czf "${workspace_unix}/${ARCHIVE_NAME}" .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-windows-vmaf-cuda
          path: ${{ steps.build_meta.outputs.archive_name }}
          if-no-files-found: error

      - name: Publish preview release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.build_meta.outputs.release_tag }}
          name: ${{ steps.build_meta.outputs.release_name }}
          prerelease: true
          body: |
            Preview build for FFmpeg `${{ steps.build_meta.outputs.ffmpeg_version }}`.

            Detailed build metadata is available in the Actions run summary.
          files: |
            ${{ steps.build_meta.outputs.archive_name }}
